name: Daily Snapshots

on:
  schedule:
    # Rodar nos dias úteis após o último fechamento entre B3 e NYSE (UTC), com margem para atrasos e sazonalidade (DST).
    # GitHub Actions usa UTC. 21:40 UTC cobre ambos os fechamentos ao longo do ano.
    - cron: '40 21 * * 1-5'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci --omit=dev
      - name: Validate Mongo configuration
        run: |
          if [ -z "${MONGO_URI}" ] && { [ -z "${DB_USER}" ] || [ -z "${DB_PASSWORD}" ]; }; then
            echo "::error ::Configure either the MONGO_URI secret or the DB_USER/DB_PASSWORD secrets (complementar DB_HOST/DB_NAME/DB_OPTIONS opcionalmente)."
            exit 1
          fi
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      - name: Run snapshot job
        run: node scripts/runSnapshot.js
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_OPTIONS: ${{ vars.DB_OPTIONS }}
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET }}
